<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>James Chan | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-bg': '#fcfcfc',
                        'brand-text': '#1a1a1a',
                        'brand-muted': '#666666',
                        'brand-border': '#eeeeee',
                        'brand-accent': '#000000',
                        'brand-surface': '#ffffff'
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        body {
            background: #fcfcfc;
            color: #1a1a1a;
            line-height: 1.6;
        }
        .fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo-box {
            width: 84px;
            height: 84px;
            border-radius: 16px;
            background: #ffffff;
            border: 1px solid #eeeeee;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            padding: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        /* 特別處理黑色背景的 Logo */
        .logo-box img[src*="5b61b7104037"] {
            background-color: #000000;
            width: 100%;
            height: 100%;
            object-fit: contain;
            margin: -8px;
            padding: 12px;
        }
        .experience-entry {
            position: relative;
            padding-bottom: 4rem;
        }
        .experience-entry:last-child {
            padding-bottom: 0;
        }
        .timeline-line {
            position: absolute;
            left: 42px;
            top: 96px;
            bottom: 0;
            width: 1px;
            background: #eeeeee;
        }
        .experience-entry:last-child .timeline-line {
            display: none;
        }
        nav a.active {
            color: #000000;
            font-weight: 600;
        }
    </style>
</head>
<body class="antialiased font-sans selection:bg-black selection:text-white">
    <script src="./data.js"></script>

    <!-- Navigation -->
    <nav class="fixed inset-x-0 top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-brand-border">
        <div class="max-w-6xl mx-auto px-6 md:px-10 py-5 flex items-center justify-between">
            <a href="#" class="text-xl font-bold tracking-tighter italic">James.</a>
            <div class="flex items-center gap-8 text-sm font-medium">
                <div class="hidden md:flex items-center gap-8">
                    <a href="#about" class="text-brand-muted hover:text-black transition-colors" id="nav-about"></a>
                    <a href="#experience" class="text-brand-muted hover:text-black transition-colors" id="nav-experience"></a>
                    <a href="#leadership" class="text-brand-muted hover:text-black transition-colors" id="nav-leadership"></a>
                    <a href="#projects" class="text-brand-muted hover:text-black transition-colors" id="nav-projects"></a>
                </div>
                <button id="lang-toggle" onclick="toggleLanguage()" class="bg-black text-white px-4 py-1.5 rounded-full text-xs font-bold tracking-widest hover:scale-105 transition-transform"></button>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <header class="min-h-[85vh] flex items-center pt-32 pb-20 px-6 md:px-10">
        <div class="max-w-5xl mx-auto w-full fade-in">
            <div class="inline-block px-3 py-1 bg-gray-100 rounded-md text-[10px] uppercase tracking-[0.3em] font-bold text-gray-500 mb-8">Available for Opportunities</div>
            <h1 class="text-6xl md:text-8xl font-extrabold tracking-tight leading-[0.9] mb-8" id="hero-name"></h1>
            <h2 class="text-2xl md:text-3xl font-medium text-gray-400 mb-10 max-w-3xl" id="hero-title"></h2>
            <p class="max-w-2xl text-lg md:text-xl text-brand-muted leading-relaxed mb-12" id="hero-subtitle"></p>
            <div class="flex gap-4">
                <a href="#experience" class="bg-black text-white px-8 py-4 rounded-full font-semibold hover:bg-gray-800 transition-all flex items-center gap-2 group" id="hero-cta">
                    <span></span>
                    <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 md:px-10 space-y-32 pb-32">
        <!-- About -->
        <section id="about" class="grid grid-cols-1 md:grid-cols-12 gap-10 scroll-mt-32">
            <div class="md:col-span-4">
                <h3 class="text-xs uppercase tracking-[0.4em] font-bold text-gray-400" id="about-title"></h3>
            </div>
            <div class="md:col-span-8">
                <p class="text-2xl md:text-3xl font-medium leading-tight text-brand-text" id="about-description"></p>
            </div>
        </section>

        <!-- Experience -->
        <section id="experience" class="grid grid-cols-1 md:grid-cols-12 gap-10 scroll-mt-32">
            <div class="md:col-span-4">
                <h3 class="text-xs uppercase tracking-[0.4em] font-bold text-gray-400" id="experience-title"></h3>
            </div>
            <div class="md:col-span-8 space-y-0" id="experience-list"></div>
        </section>

        <!-- Leadership -->
        <section id="leadership" class="grid grid-cols-1 md:grid-cols-12 gap-10 scroll-mt-32">
            <div class="md:col-span-4">
                <h3 class="text-xs uppercase tracking-[0.4em] font-bold text-gray-400" id="leadership-title"></h3>
            </div>
            <div class="md:col-span-8 space-y-0" id="leadership-list"></div>
        </section>

        <!-- Projects -->
        <section id="projects" class="grid grid-cols-1 md:grid-cols-12 gap-10 scroll-mt-32">
            <div class="md:col-span-4">
                <h3 class="text-xs uppercase tracking-[0.4em] font-bold text-gray-400" id="projects-title"></h3>
            </div>
            <div class="md:col-span-8 grid grid-cols-1 md:grid-cols-2 gap-6" id="projects-list"></div>
        </section>

        <!-- Skills -->
        <section id="skills" class="grid grid-cols-1 md:grid-cols-12 gap-10 scroll-mt-32">
            <div class="md:col-span-4">
                <h3 class="text-xs uppercase tracking-[0.4em] font-bold text-gray-400" id="skills-title"></h3>
            </div>
            <div class="md:col-span-8">
                <ul class="grid grid-cols-1 gap-6" id="skills-list"></ul>
            </div>
        </section>

        <!-- Contact -->
        <section id="contact" class="bg-black text-white rounded-[40px] p-10 md:p-20 scroll-mt-32 overflow-hidden relative">
            <div class="relative z-10">
                <h3 class="text-5xl md:text-7xl font-bold tracking-tighter mb-10" id="contact-title"></h3>
                <p class="text-xl md:text-2xl text-gray-400 max-w-2xl mb-12" id="contact-description"></p>
                <div class="flex flex-wrap gap-10">
                    <a id="contact-email" href="" class="group">
                        <div class="text-xs uppercase tracking-widest text-gray-500 mb-2">Email Me</div>
                        <div class="text-2xl font-semibold group-hover:text-gray-300 transition-colors flex items-center gap-2">
                            <span class="email-text"></span>
                            <svg class="w-5 h-5 opacity-0 group-hover:opacity-100 -translate-x-2 group-hover:translate-x-0 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </div>
                    </a>
                    <a id="contact-phone" href="" class="group">
                        <div class="text-xs uppercase tracking-widest text-gray-500 mb-2">Call Me</div>
                        <div class="text-2xl font-semibold group-hover:text-gray-300 transition-colors phone-text"></div>
                    </a>
                </div>
            </div>
            <!-- Decorative circle -->
            <div class="absolute -right-20 -bottom-20 w-80 h-80 bg-white/5 rounded-full blur-3xl"></div>
        </section>
    </main>

    <footer class="py-20 text-center border-t border-brand-border">
        <p class="text-sm text-gray-400">&copy; <span id="year"></span> James Chan. Crafted with care.</p>
    </footer>

    <script>
        document.getElementById('year').innerText = new Date().getFullYear();
        let currentLang = 'en';

        function renderEntry(item, isProject = false) {
            if (isProject) {
                return `
                    <div class="group bg-white border border-brand-border p-8 rounded-3xl hover:border-black transition-all hover:shadow-xl hover:shadow-black/5">
                        <h4 class="text-2xl font-bold mb-2">${item.name}</h4>
                        <div class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-6">${item.period}</div>
                        <p class="text-brand-muted mb-8 text-sm leading-relaxed">${item.summary}</p>
                        <ul class="space-y-3">
                            ${(item.highlights || []).map(h => `
                                <li class="flex items-start gap-3 text-sm font-medium">
                                    <span class="w-1.5 h-1.5 rounded-full bg-black mt-2 flex-shrink-0"></span>
                                    <span>${h}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
            }

            const icon = item.companyIcon 
                ? `<div class="logo-box"><img src="${item.companyIcon}" alt="${item.company}" class="w-full h-full object-contain"></div>`
                : `<div class="logo-box bg-gray-50 font-bold text-gray-300">${(item.company || '').slice(0,2).toUpperCase()}</div>`;

            return `
                <div class="experience-entry group">
                    <div class="timeline-line"></div>
                    <div class="flex flex-col md:flex-row gap-8 relative">
                        ${icon}
                        <div class="flex-1">
                            <div class="flex flex-col md:flex-row md:items-baseline md:justify-between gap-2 mb-6">
                                <div>
                                    <h4 class="text-2xl font-bold group-hover:text-black transition-colors">${item.role}</h4>
                                    <div class="text-lg font-medium text-gray-400 mt-1">${item.company}</div>
                                </div>
                                <div class="text-sm font-bold text-gray-300 uppercase tracking-widest whitespace-nowrap">${item.period}</div>
                            </div>
                            
                            ${item.summary ? `<p class="text-lg text-brand-muted mb-6 leading-relaxed max-w-3xl">${item.summary}</p>` : ''}
                            
                            <ul class="space-y-4 mb-8 max-w-3xl">
                                ${(item.achievements || []).map(a => `
                                    <li class="flex items-start gap-4 text-brand-muted leading-relaxed">
                                        <span class="w-1.5 h-1.5 rounded-full bg-gray-300 mt-2.5 flex-shrink-0"></span>
                                        <span class="text-[0.95rem] font-medium">${a}</span>
                                    </li>
                                `).join('')}
                            </ul>
                            
                            ${item.takeaway ? `
                                <div class="inline-flex items-start gap-3 bg-gray-50 rounded-2xl p-5 border border-gray-100 max-w-2xl">
                                    <span class="text-xs font-black uppercase tracking-tighter text-gray-400 mt-1">Outcome</span>
                                    <p class="text-sm font-semibold italic text-brand-text leading-snug">${item.takeaway}</p>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderContent() {
            const data = siteData[currentLang];
            document.documentElement.lang = currentLang;

            document.getElementById('nav-about').innerText = data.nav.about;
            document.getElementById('nav-experience').innerText = data.nav.experience;
            document.getElementById('nav-leadership').innerText = data.nav.leadership;
            document.getElementById('nav-projects').innerText = data.nav.projects;
            document.getElementById('lang-toggle').innerText = data.nav.languageToggle;

            document.getElementById('hero-name').innerText = data.hero.name;
            document.getElementById('hero-title').innerText = data.hero.title;
            document.getElementById('hero-subtitle').innerText = data.hero.subtitle;
            document.getElementById('hero-cta').querySelector('span').innerText = data.hero.cta;

            document.getElementById('about-title').innerText = data.about.title;
            document.getElementById('about-description').innerText = data.about.description;

            document.getElementById('experience-title').innerText = data.experience.title;
            document.getElementById('experience-list').innerHTML = data.experience.items.map(i => renderEntry(i)).join('');

            document.getElementById('leadership-title').innerText = data.leadership.title;
            document.getElementById('leadership-list').innerHTML = data.leadership.items.map(i => renderEntry(i)).join('');

            document.getElementById('projects-title').innerText = data.projects.title;
            document.getElementById('projects-list').innerHTML = data.projects.items.map(i => renderEntry(i, true)).join('');

            document.getElementById('skills-title').innerText = data.skills.title;
            document.getElementById('skills-list').innerHTML = data.skills.items.map(s => `
                <li class="group flex items-baseline gap-6 border-b border-brand-border pb-6 last:border-0">
                    <span class="text-brand-text font-bold text-lg min-w-[200px] leading-none">${s.split(':')[0]}</span>
                    <span class="text-brand-muted font-medium text-base">${s.split(':')[1] || ''}</span>
                </li>
            `).join('');

            document.getElementById('contact-title').innerText = data.contact.title;
            document.getElementById('contact-description').innerText = data.contact.description;
            document.getElementById('contact-email').href = 'mailto:' + data.contact.email;
            document.getElementById('contact-email').querySelector('.email-text').innerText = data.contact.email;
            document.getElementById('contact-phone').href = 'tel:' + data.contact.phone.replace(/[^0-9+]/g, '');
            document.getElementById('contact-phone').querySelector('.phone-text').innerText = data.contact.phone;
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            renderContent();
        }

        renderContent();
    </script>
</body>
</html>
