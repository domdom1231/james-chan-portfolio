<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>James Chan | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-bg': '#ffffff',
                        'brand-text': '#111111',
                        'brand-muted': '#666666',
                        'brand-border': '#eeeeee',
                        'brand-accent': '#000000',
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        body { background: #ffffff; color: #111111; line-height: 1.5; }
        .logo-box {
            width: 80px; height: 80px; border-radius: 12px; background: #fff;
            border: 1px solid #eee; display: flex; align-items: center; justify-content: center;
            overflow: hidden; flex-shrink: 0; padding: 6px;
        }
        .logo-box img[src*="5b61b7104037"] { background-color: #000; width: 100%; height: 100%; object-fit: contain; margin: -6px; padding: 10px; }
        
        /* Modal Styles */
        .modal {
            display: none; position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.4); backdrop-blur: 4px;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white; width: 100%; max-width: 600px; border-radius: 24px;
            padding: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-height: 90vh; overflow-y: auto; position: relative;
        }
    </style>
</head>
<body class="antialiased font-sans">
    <script src="./data.js"></script>

    <!-- Modal -->
    <div id="detail-modal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-black text-2xl">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="fixed inset-x-0 top-0 z-50 bg-white/80 backdrop-blur-md border-b border-brand-border">
        <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="#" class="text-lg font-bold tracking-tight">James Chan</a>
            <div class="flex items-center gap-6 text-sm font-medium">
                <div class="hidden md:flex gap-6">
                    <a href="#about" class="text-brand-muted hover:text-black" id="nav-about"></a>
                    <a href="#experience" class="text-brand-muted hover:text-black" id="nav-experience"></a>
                    <a href="#leadership" class="text-brand-muted hover:text-black" id="nav-leadership"></a>
                </div>
                <button id="lang-toggle" onclick="toggleLanguage()" class="border border-brand-border px-3 py-1 rounded-full text-[10px] font-bold tracking-widest"></button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 pt-32 pb-20 space-y-24">
        <!-- Hero -->
        <section class="py-10">
            <h1 class="text-5xl md:text-7xl font-bold tracking-tight mb-6" id="hero-name"></h1>
            <h2 class="text-xl md:text-2xl text-brand-muted mb-8" id="hero-title"></h2>
            <p class="max-w-2xl text-lg text-brand-muted" id="hero-subtitle"></p>
        </section>

        <!-- About -->
        <section id="about" class="pt-10 border-t border-brand-border grid md:grid-cols-4 gap-8">
            <div class="text-xs font-bold uppercase tracking-widest text-gray-400" id="about-title"></div>
            <div class="md:col-span-3">
                <p class="text-lg text-brand-text leading-relaxed" id="about-description"></p>
            </div>
        </section>

        <!-- Experience -->
        <section id="experience" class="pt-10 border-t border-brand-border grid md:grid-cols-4 gap-8">
            <div class="text-xs font-bold uppercase tracking-widest text-gray-400" id="experience-title"></div>
            <div class="md:col-span-3 space-y-12" id="experience-list"></div>
        </section>

        <!-- Leadership -->
        <section id="leadership" class="pt-10 border-t border-brand-border grid md:grid-cols-4 gap-8">
            <div class="text-xs font-bold uppercase tracking-widest text-gray-400" id="leadership-title"></div>
            <div class="md:col-span-3 space-y-12" id="leadership-list"></div>
        </section>

        <!-- Contact -->
        <section id="contact" class="pt-10 border-t border-brand-border">
            <h3 class="text-3xl font-bold mb-6" id="contact-title"></h3>
            <p class="text-lg text-brand-muted mb-8" id="contact-description"></p>
            <div class="flex flex-wrap gap-6">
                <a id="contact-email" href="" class="text-lg font-bold underline underline-offset-4 decoration-1 hover:text-blue-600 transition-colors"></a>
                <a id="contact-phone" href="" class="text-lg font-bold"></a>
            </div>
        </section>
    </main>

    <footer class="py-10 text-center text-xs text-gray-400">
        &copy; <span id="year"></span> James Chan.
    </footer>

    <script>
        document.getElementById('year').innerText = new Date().getFullYear();
        let currentLang = 'en';

        function showDetail(type, index) {
            const data = siteData[currentLang][type].items[index];
            const modal = document.getElementById('detail-modal');
            const body = document.getElementById('modal-body');
            
            const tagsHtml = data.tags ? `
                <div class="flex flex-wrap gap-2 mb-6">
                    ${data.tags.map(t => `<span class="px-2 py-1 bg-gray-100 text-gray-600 text-[10px] font-bold rounded uppercase tracking-wider">${t}</span>`).join('')}
                </div>
            ` : '';

            body.innerHTML = `
                <div class="flex items-center gap-4 mb-6">
                    <div class="logo-box"><img src="${data.companyIcon}" class="w-full h-full object-contain"></div>
                    <div>
                        <h4 class="text-2xl font-bold">${data.role}</h4>
                        <div class="text-brand-muted">${data.company}</div>
                    </div>
                </div>
                ${tagsHtml}
                <div class="space-y-6">
                    <div>
                        <div class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-3">Key Achievements</div>
                        <ul class="space-y-3">
                            ${(data.achievements || []).map(a => `<li class="flex gap-3 text-sm text-brand-muted"><span class="w-1 h-1 rounded-full bg-black mt-2 flex-shrink-0"></span><span>${a}</span></li>`).join('')}
                        </ul>
                    </div>
                    ${data.takeaway ? `
                        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                            <div class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-1">Key Takeaway</div>
                            <p class="text-sm font-medium italic">${data.takeaway}</p>
                        </div>
                    ` : ''}
                </div>
            `;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function renderEntry(item, index, type) {
            const tagsHtml = item.tags ? `
                <div class="flex flex-wrap gap-2 mb-4">
                    ${item.tags.map(t => `<span class="px-2 py-0.5 bg-gray-50 text-gray-400 text-[9px] font-bold rounded-full border border-gray-100 uppercase tracking-tighter">${t}</span>`).join('')}
                </div>
            ` : '';

            return `
                <div class="flex flex-col md:flex-row gap-6">
                    <div class="logo-box"><img src="${item.companyIcon}" class="w-full h-full object-contain"></div>
                    <div class="flex-1">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="text-xl font-bold">${item.role}</h4>
                            <span class="text-xs font-bold text-gray-300 uppercase tracking-widest">${item.period}</span>
                        </div>
                        <div class="text-brand-muted font-medium mb-3">${item.company}</div>
                        ${tagsHtml}
                        <p class="text-sm text-brand-muted leading-relaxed mb-4 line-clamp-3">${item.summary}</p>
                        <button onclick="showDetail('${type}', ${index})" class="text-xs font-bold uppercase tracking-widest border-b-2 border-black pb-0.5 hover:opacity-50 transition-opacity">View Details</button>
                    </div>
                </div>
            `;
        }

        function renderContent() {
            const data = siteData[currentLang];
            document.documentElement.lang = currentLang;
            document.getElementById('nav-about').innerText = data.nav.about;
            document.getElementById('nav-experience').innerText = data.nav.experience;
            document.getElementById('nav-leadership').innerText = data.nav.leadership;
            document.getElementById('lang-toggle').innerText = data.nav.languageToggle;
            document.getElementById('hero-name').innerText = data.hero.name;
            document.getElementById('hero-title').innerText = data.hero.title;
            document.getElementById('hero-subtitle').innerText = data.hero.subtitle;
            document.getElementById('about-title').innerText = data.about.title;
            document.getElementById('about-description').innerText = data.about.description;
            document.getElementById('experience-title').innerText = data.experience.title;
            document.getElementById('experience-list').innerHTML = data.experience.items.map((i, idx) => renderEntry(i, idx, 'experience')).join('');
            document.getElementById('leadership-title').innerText = data.leadership.title;
            document.getElementById('leadership-list').innerHTML = data.leadership.items.map((i, idx) => renderEntry(i, idx, 'leadership')).join('');
            document.getElementById('contact-title').innerText = data.contact.title;
            document.getElementById('contact-description').innerText = data.contact.description;
            document.getElementById('contact-email').href = 'mailto:' + data.contact.email;
            document.getElementById('contact-email').innerText = data.contact.email;
            document.getElementById('contact-phone').innerText = data.contact.phone;
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            renderContent();
        }

        renderContent();
    </script>
</body>
</html>
